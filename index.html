<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="fc:frame" content='{"version":"next","imageUrl":"https://base-mini-dapp.vercel.app/og.png","button":{"title":"Launch App","action":{"type":"launch_frame","name":"HelloBase","url":"https://base-mini-dapp.vercel.app/"}}}' />
  <title>Mesut Dashboard</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
  <script type="module">
    import { sdk } from "https://esm.sh/@farcaster/frame-sdk";
    window.fSDK = sdk;
    sdk.actions.ready().catch(() => {});
  </script>

  <style>
    :root{--bg:#020617;--card:#0f172a;--border:#1e293b;--accent:#3b82f6;--text:#f8fafc;--sub:#94a3b8;}
    body{font-family:system-ui,-apple-system,sans-serif;background:radial-gradient(circle at top,#1e3a8a 0,#020617 50%,#000 100%);color:var(--text);margin:0;padding:15px;min-height:100dvh;display:flex;justify-content:center;align-items:center;}
    .shell{width:100%;max-width:920px;display:grid;grid-template-columns:1.5fr 1fr;gap:20px;}
    @media(max-width:768px){.shell{grid-template-columns:1fr;}}
    .card{background:var(--card);border:1px solid var(--border);border-radius:24px;padding:24px;box-shadow:0 25px 50px rgba(0,0,0,0.5);backdrop-filter:blur(10px);}
    button{background:var(--accent);border:none;border-radius:12px;color:#fff;padding:12px 18px;cursor:pointer;font-weight:600;font-size:13px;transition:0.2s;}
    button:active{transform:scale(0.96);}
    button:disabled{opacity:0.4;cursor:not-allowed;}
    .box{background:rgba(0,0,0,0.3);border:1px solid var(--border);border-radius:16px;padding:12px;margin-top:10px;font-size:13px;}
    input{width:100%;padding:12px;border-radius:12px;border:1px solid var(--border);background:#000;color:#fff;margin:10px 0;outline:none;box-sizing:border-box;}
    .tx-item{font-size:11px;padding:10px 0;border-bottom:1px solid var(--border);color:var(--sub);word-break:break-all;}
    .tx-item:last-child{border:none;}
    a{text-decoration:none;color:inherit;}
    .link-btn{display:flex;justify-content:space-between;padding:12px;background:rgba(30,41,59,0.5);border:1px solid var(--border);border-radius:14px;font-size:13px;margin-bottom:8px;transition:0.2s;}
    .link-btn:hover{background:rgba(59,130,246,0.15);border-color:var(--accent);}
  </style>
</head>
<body>

<div class="shell">
  <div class="card">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
      <div>
        <h2 style="margin:0; font-size:18px;">HelloBase Panel</h2>
        <span style="font-size:11px; color:var(--sub);">Builder: Mesut Öztürk</span>
      </div>
      <button id="connectBtn">Cüzdan Bağla</button>
    </div>

    <div id="addrBox" class="box">Durum: Bağlantı Bekleniyor</div>

    <div class="box">
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <span style="font-size:10px; color:var(--sub);">ZİNCİRDEKİ MESAJ</span>
        <button id="refreshBtn" style="padding:2px 8px; font-size:10px; background:#1e293b;">Yenile</button>
      </div>
      <div id="currentMsg" style="margin-top:8px; font-weight:600; color:var(--accent); font-size:15px;">Yükleniyor...</div>
    </div>

    <div style="margin-top:20px;">
      <input type="text" id="msgInput" placeholder="Yeni mesajınızı yazın...">
      <button id="sendBtn" style="width:100%;" disabled>Mesajı Güncelle (Base)</button>
      <div id="status" style="font-size:11px; margin-top:12px; text-align:center; color:var(--sub); min-height:15px;"></div>
    </div>

    <div style="margin-top:25px;">
      <span style="font-size:10px; color:var(--sub);">İŞLEM GEÇMİŞİ (SON 5)</span>
      <div id="history" class="box" style="padding:10px;">Henüz bir işlem yapılmadı.</div>
    </div>
  </div>

  <div class="card">
    <h3 style="margin-top:0; font-size:16px;">Sosyal Bağlantılar</h3>
    <div style="display:flex; align-items:center; gap:12px; margin-bottom:20px; background:rgba(255,255,255,0.05); padding:12px; border-radius:18px;">
      <div style="width:40px; height:40px; background:linear-gradient(135deg, var(--accent), #06b6d4); border-radius:12px; display:flex; align-items:center; justify-content:center; font-weight:bold; color:white;">MÖ</div>
      <div>
        <div style="font-size:14px; font-weight:600;">Mesut Öztürk</div>
        <div style="font-size:11px; color:var(--sub);">mesutgoktug.eth</div>
      </div>
    </div>
    
    <a href="https://farcaster.xyz/mesutgoktug.eth" target="_blank" class="link-btn"><span>🟪 Farcaster</span><span>↗</span></a>
    <a href="https://x.com/soylebisey" target="_blank" class="link-btn"><span>𝕏 Twitter</span><span>↗</span></a>
    <a href="https://talent.app/mesutgoktug.eth" target="_blank" class="link-btn"><span>🏅 Talent</span><span>↗</span></a>
    <a href="https://paragraph.com/@mesutgoktug" target="_blank" class="link-btn"><span>✍️ Paragraph</span><span>↗</span></a>
    <a href="https://github.com/Mesut006" target="_blank" class="link-btn"><span>🐙 GitHub</span><span>↗</span></a>
  </div>
</div>

<script>
  const CONTRACT_ADDR = "0xD6e402b477B05f8105be4fAaC4a43E0355aCc8F8";
  const ABI = [{"inputs":[],"name":"message","outputs":[{"type":"string"}],"stateMutability":"view","type":"function"},{"inputs":[{"name":"_msg","type":"string"}],"name":"setMessage","outputs":[],"stateMutability":"nonpayable","type":"function"}];

  let provider, signer, account;

  async function connect() {
    const status = document.getElementById("status");
    status.textContent = "Cüzdan tetikleniyor...";
    
    try {
      // 1. Sağlayıcı tespiti
      let ethProvider = window.ethereum;
      if (window.fSDK && window.fSDK.wallet) {
        try { ethProvider = await window.fSDK.wallet.getEthereumProvider(); } catch(e) {}
      }

      if (!ethProvider) {
        status.textContent = "Hata: Cüzdan bulunamadı. Lütfen MetaMask yükleyin.";
        return;
      }

      // 2. Zorunlu hesap isteği (Cüzdanın uyanmasını sağlar)
      const accounts = await ethProvider.request({ 
        method: 'wallet_requestPermissions', 
        params: [{ eth_accounts: {} }] 
      }).then(() => ethProvider.request({ method: 'eth_requestAccounts' }));

      account = accounts[0];
      provider = new ethers.providers.Web3Provider(ethProvider, "any");
      signer = provider.getSigner();

      // UI Güncelleme
      document.getElementById("addrBox").textContent = "Cüzdan: " + account.slice(0,6) + "..." + account.slice(-4);
      document.getElementById("connectBtn").textContent = "Bağlandı";
      document.getElementById("sendBtn").disabled = false;
      status.textContent = "Bağlantı başarılı! ✅";

    } catch (err) {
      console.error(err);
      status.textContent = "Bağlantı reddedildi veya zaman aşımı.";
    }
  }

  async function loadMsg() {
    try {
      const rpc = new ethers.providers.JsonRpcProvider("https://base-rpc.publicnode.com");
      const contract = new ethers.Contract(CONTRACT_ADDR, ABI, rpc);
      const msg = await contract.message();
      document.getElementById("currentMsg").textContent = msg || "(Boş)";
    } catch (e) {
      document.getElementById("currentMsg").textContent = "Yüklenemedi";
    }
  }

  async function updateMsg() {
    const val = document.getElementById("msgInput").value;
    const status = document.getElementById("status");
    if(!val || !signer) return;
    try {
      status.textContent = "Cüzdan onayı bekleniyor...";
      const contract = new ethers.Contract(CONTRACT_ADDR, ABI, signer);
      const tx = await contract.setMessage(val);
      status.textContent = "İşlem ağa gönderildi...";
      await tx.wait();
      status.textContent = "Güncellendi! ✅";
      addTx(tx.hash);
      loadMsg();
      document.getElementById("msgInput").value = "";
    } catch (e) { 
      status.textContent = "Hata: İşlem iptal edildi."; 
    }
  }

  function addTx(hash) {
    const hist = document.getElementById("history");
    if(hist.innerText.includes("yok")) hist.innerHTML = "";
    const div = document.createElement("div");
    div.className = "tx-item";
    div.innerHTML = `<span>TX: ${hash.slice(0,18)}...</span> <a href="https://basescan.org/tx/${hash}" target="_blank" style="color:var(--accent); float:right;">Basescan ↗</a>`;
    hist.prepend(div);
  }

  document.getElementById("connectBtn").onclick = connect;
  document.getElementById("sendBtn").onclick = updateMsg;
  document.getElementById("refreshBtn").onclick = loadMsg;
  loadMsg();
</script>
</body>
</html>
