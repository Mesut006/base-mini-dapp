<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  
  <meta name="fc:frame" content='{"version":"next","imageUrl":"https://base-mini-dapp.vercel.app/og.png","button":{"title":"Launch App","action":{"type":"launch_frame","name":"HelloBase Dashboard","url":"https://base-mini-dapp.vercel.app/","splashImageUrl":"https://base-mini-dapp.vercel.app/icon.png","splashBackgroundColor":"#020617"}}}' />
  
  <link rel="manifest" href="/manifest.json" />
  <title>Mesut - HelloBase Mini dApp</title>

  <script type="module">
    import { sdk } from "https://esm.sh/@farcaster/frame-sdk";
    window.__frameSDK = sdk; 

    const init = async () => {
      try {
        await sdk.actions.ready();
      } catch (e) {
        console.warn("SDK Ready sinyali gönderilemedi, muhtemelen normal tarayıcıdasınız.");
      }
    };
    init();
  </script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>

  <style>
    :root{--bg:#020617;--bg-card:#020617;--border:#1e293b;--accent:#3b82f6;--text-main:#e5e7eb;--text-sub:#9ca3af;--text-muted:#6b7280;}
    *{box-sizing:border-box}
    body{font-family:system-ui,-apple-system,sans-serif;background:radial-gradient(circle at top,#1d4ed8 0,#020617 40%,#000 100%);color:var(--text-main);display:flex;justify-content:center;align-items:center;min-height:100dvh;margin:0;padding:16px;}
    .shell{width:100%;max-width:940px;display:grid;grid-template-columns:3fr 2fr;gap:20px;}
    @media(max-width:768px){.shell{grid-template-columns:1fr;}}
    .card{background:var(--bg-card);border:1px solid var(--border);border-radius:20px;padding:22px;box-shadow:0 20px 40px rgba(0,0,0,0.6);position:relative;overflow:hidden;}
    .header-row{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;}
    .logo-pill{display:inline-flex;align-items:center;gap:8px;padding:4px 10px;border-radius:999px;background:rgba(15,23,42,0.9);border:1px solid rgba(51,65,85,0.8);font-size:11px;color:var(--text-sub);}
    .logo-circle{width:16px;height:16px;border-radius:999px;background:#0ea5e9;}
    h1{font-size:22px;margin:8px 0;color:#e0f2fe;font-weight:700;}
    .badge-row{display:flex;gap:6px;margin-top:8px;}
    .badge{font-size:10px;border-radius:999px;padding:3px 9px;border:1px solid rgba(51,65,85,0.9);color:var(--text-sub);background:rgba(15,23,42,0.9);}
    button{background:var(--accent);border:none;border-radius:999px;color:#fff;padding:10px 18px;cursor:pointer;font-size:13px;font-weight:600;transition:opacity 0.2s;}
    button:disabled{background:#4b5563;cursor:not-allowed;}
    .section{margin-top:20px;}
    .label{font-size:11px;color:var(--text-sub);text-transform:uppercase;letter-spacing:0.05em;display:block;margin-bottom:6px;}
    .value-box{border-radius:14px;border:1px solid var(--border);padding:12px;background:rgba(15,23,42,0.96);font-size:13px;display:flex;justify-content:space-between;align-items:center;}
    input{width:100%;padding:12px;border-radius:12px;border:1px solid var(--border);background:rgba(15,23,42,0.96);color:var(--text-main);margin-bottom:10px;outline:none;}
    
    /* Social Hub */
    a{text-decoration:none;color:inherit;}
    .profile-card{display:flex;gap:12px;align-items:center;padding:12px;border:1px solid rgba(51,65,85,0.9);border-radius:16px;background:rgba(15,23,42,0.95);margin-bottom:15px;}
    .pfp{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-weight:700;background:linear-gradient(135deg,#60a5fa,#22d3ee);color:#0b1120;}
    .link-btn{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;border-radius:14px;border:1px solid rgba(51,65,85,0.9);background:rgba(15,23,42,0.92);font-size:12px;margin-bottom:8px;transition: border-color 0.2s;}
    .link-btn:hover{border-color: var(--accent);}
    .link-ico{width:26px;height:26px;display:flex;align-items:center;justify-content:center;background:rgba(59,130,246,0.1);border-radius:8px;}
  </style>
</head>

<body>
  <div class="shell">
    <div class="card">
      <div class="header-row">
        <div>
          <div class="logo-pill"><div class="logo-circle"></div><span>Base • Onchain App</span></div>
          <h1>HelloBase Dashboard</h1>
          <div class="badge-row">
            <div class="badge">0xD6e4…c8F8</div>
            <div class="badge">Builder: Mesut</div>
          </div>
        </div>
        <button id="connectBtn">Cüzdanı Bağla</button>
      </div>

      <div class="section">
        <span class="label">Bağlantı Durumu</span>
        <div class="value-box" id="walletAddr">Bağlı değil</div>
      </div>

      <div class="section">
        <span class="label">Güncel Mesaj</span>
        <div class="value-box">
          <span id="currentMsg">Yükleniyor...</span>
          <button id="refreshBtn" style="padding:2px 8px; font-size:10px;">Yenile</button>
        </div>
      </div>

      <div class="section">
        <span class="label">Yeni Mesaj</span>
        <input id="msgInput" placeholder="Mesajınızı yazın..." />
        <button id="sendBtn" style="width:100%" disabled>Güncelle</button>
        <p id="statusTxt" style="font-size:11px; color:var(--text-sub); margin-top:10px; text-align:center;"></p>
      </div>
    </div>

    <div class="card">
      <div style="font-size:13px; font-weight:600; margin-bottom:12px;">Mesut • Social Hub</div>
      <div class="profile-card">
        <div class="pfp">MÖ</div>
        <div>
          <div style="font-size:15px; font-weight:700;">Mesut Öztürk</div>
          <div style="font-size:11px; color:var(--text-sub);">mesutgoktug.eth</div>
        </div>
      </div>
      
      <div class="link-grid">
        <a href="https://farcaster.xyz/mesutgoktug.eth" target="_blank" class="link-btn">
          <div style="display:flex; align-items:center; gap:10px;"><div class="link-ico">🟪</div>Farcaster</div><span>↗</span>
        </a>
        <a href="https://x.com/soylebisey" target="_blank" class="link-btn">
          <div style="display:flex; align-items:center; gap:10px;"><div class="link-ico">𝕏</div>X (Twitter)</div><span>↗</span>
        </a>
        <a href="https://talent.app/mesutgoktug.eth" target="_blank" class="link-btn">
          <div style="display:flex; align-items:center; gap:10px;"><div class="link-ico">🏅</div>Talent</div><span>↗</span>
        </a>
        <a href="https://paragraph.com/@mesutgoktug" target="_blank" class="link-btn">
          <div style="display:flex; align-items:center; gap:10px;"><div class="link-ico">✍️</div>Paragraph</div><span>↗</span>
        </a>
        <a href="https://github.com/Mesut006" target="_blank" class="link-btn">
          <div style="display:flex; align-items:center; gap:10px;"><div class="link-ico">🐙</div>GitHub</div><span>↗</span>
        </a>
      </div>
    </div>
  </div>

  <script>
    const CONTRACT_ADDR = "0xD6e402b477B05f8105be4fAaC4a43E0355aCc8F8";
    const ABI = [
      {"inputs":[],"name":"message","outputs":[{"type":"string"}],"stateMutability":"view","type":"function"},
      {"inputs":[{"name":"newMessage","type":"string"}],"name":"setMessage","outputs":[],"stateMutability":"nonpayable","type":"function"}
    ];

    let provider, signer, address;

    // Hata almamak için provider'ı güvenli bir şekilde seçen fonksiyon
    async function safeGetProvider() {
      // 1. Önce Farcaster/Base SDK kontrolü
      if (window.__frameSDK && window.__frameSDK.wallet) {
        try {
          const p = await window.__frameSDK.wallet.getEthereumProvider();
          if (p) return p;
        } catch (e) { console.warn("SDK Wallet not available"); }
      }
      // 2. Normal tarayıcı provider'ı
      if (window.ethereum) return window.ethereum;
      return null;
    }

    async function handleConnect() {
      const status = document.getElementById("statusTxt");
      status.textContent = "Cüzdan aranıyor...";
      
      try {
        const eipProvider = await safeGetProvider();
        if (!eipProvider) throw new Error("Cüzdan bulunamadı! Lütfen bir Web3 cüzdanı kullanın.");

        // Hesapları iste
        const accounts = await eipProvider.request({ method: "eth_requestAccounts" });
        if (!accounts || accounts.length === 0) throw new Error("Hesap seçilmedi.");
        
        address = accounts[0];
        provider = new ethers.providers.Web3Provider(eipProvider);
        signer = provider.getSigner();

        document.getElementById("walletAddr").textContent = address.slice(0,6) + "..." + address.slice(-4);
        document.getElementById("connectBtn").textContent = "Bağlandı ✅";
        document.getElementById("sendBtn").disabled = false;
        status.textContent = "Bağlantı başarılı!";
      } catch (err) {
        status.textContent = "Hata: " + (err.message || "Bağlanılamadı");
        console.error(err);
      }
    }

    async function loadContractMessage() {
      try {
        const rpc = new ethers.providers.JsonRpcProvider("https://base-rpc.publicnode.com");
        const contract = new ethers.Contract(CONTRACT_ADDR, ABI, rpc);
        const msg = await contract.message();
        document.getElementById("currentMsg").textContent = msg || "(Boş)";
      } catch (e) {
        document.getElementById("currentMsg").textContent = "Yüklenemedi";
      }
    }

    async function handleSend() {
      const input = document.getElementById("msgInput").value;
      const status = document.getElementById("statusTxt");
      if(!input) return;

      try {
        status.textContent = "Cüzdan onayı bekleniyor...";
        const contract = new ethers.Contract(CONTRACT_ADDR, ABI, signer);
        const tx = await contract.setMessage(input);
        status.textContent = "İşlem ağa gönderildi...";
        await tx.wait();
        status.textContent = "Mesaj güncellendi! ✅";
        document.getElementById("msgInput").value = "";
        loadContractMessage();
      } catch (e) {
        status.textContent = "İşlem reddedildi veya hata oluştu.";
      }
    }

    document.getElementById("connectBtn").onclick = handleConnect;
    document.getElementById("sendBtn").onclick = handleSend;
    document.getElementById("refreshBtn").onclick = loadContractMessage;
    
    // Sayfa açılışında mesajı getir
    loadContractMessage();
  </script>
</body>
</html>
