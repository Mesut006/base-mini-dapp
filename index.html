<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="fc:frame" content='{"version":"next","imageUrl":"https://base-mini-dapp.vercel.app/og.png","button":{"title":"Launch App","action":{"type":"launch_frame","name":"HelloBase","url":"https://base-mini-dapp.vercel.app/"}}}' />
  <title>Mesut Dashboard</title>

  <script type="module">
    import { sdk } from "https://esm.sh/@farcaster/frame-sdk";
    window.fSDK = sdk;
    sdk.actions.ready().catch(() => {});
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>

  <style>
    :root{--bg:#020617;--card:#0f172a;--border:#1e293b;--accent:#3b82f6;--text:#f8fafc;--sub:#94a3b8;}
    body{font-family:system-ui,sans-serif;background:radial-gradient(circle at top,#1e3a8a 0,#020617 50%,#000 100%);color:var(--text);margin:0;padding:15px;min-height:100dvh;display:flex;justify-content:center;align-items:center;}
    .shell{width:100%;max-width:920px;display:grid;grid-template-columns:1.5fr 1fr;gap:20px;}
    @media(max-width:768px){.shell{grid-template-columns:1fr;}}
    .card{background:var(--card);border:1px solid var(--border);border-radius:24px;padding:24px;box-shadow:0 25px 50px rgba(0,0,0,0.5);}
    button{background:var(--accent);border:none;border-radius:12px;color:#fff;padding:10px 16px;cursor:pointer;font-weight:600;font-size:13px;}
    button:disabled{opacity:0.5;cursor:not-allowed;}
    .box{background:rgba(0,0,0,0.3);border:1px solid var(--border);border-radius:16px;padding:12px;margin-top:10px;font-size:13px;}
    input{width:100%;padding:12px;border-radius:12px;border:1px solid var(--border);background:#000;color:#fff;margin:10px 0;outline:none;}
    .tx-item{font-size:11px;padding:6px 0;border-bottom:1px solid var(--border);color:var(--sub);word-break:break-all;}
    a{text-decoration:none;color:inherit;}
    .link-btn{display:flex;justify-content:space-between;padding:12px;background:rgba(30,41,59,0.5);border:1px solid var(--border);border-radius:14px;font-size:13px;margin-bottom:8px;}
  </style>
</head>
<body>

<div class="shell">
  <div class="card">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
      <div>
        <h2 style="margin:0; font-size:18px;">HelloBase Panel</h2>
        <span style="font-size:11px; color:var(--sub);">Builder: Mesut Öztürk</span>
      </div>
      <button id="connectBtn">Cüzdan Bağla</button>
    </div>

    <div id="addrBox" class="box">Durum: Bağlı Değil</div>

    <div class="box">
      <div style="display:flex; justify-content:space-between;">
        <span style="font-size:10px; color:var(--sub);">ZİNCİRDEKİ MESAJ</span>
        <button id="refreshBtn" style="padding:2px 8px; font-size:10px; background:#1e293b;">Yenile</button>
      </div>
      <div id="currentMsg" style="margin-top:8px; font-weight:600;">Yükleniyor...</div>
    </div>

    <input type="text" id="msgInput" placeholder="Yeni mesaj...">
    <button id="sendBtn" style="width:100%;" disabled>Mesajı Güncelle</button>
    <div id="status" style="font-size:11px; margin-top:10px; text-align:center; color:var(--sub);"></div>

    <div style="margin-top:20px;">
      <span style="font-size:10px; color:var(--sub);">İŞLEM GEÇMİŞİ (SON 5)</span>
      <div id="history" class="box" style="padding:10px;">Henüz işlem yok.</div>
    </div>
  </div>

  <div class="card">
    <h3 style="margin-top:0; font-size:16px;">Sosyal Bağlantılar</h3>
    <div style="display:flex; align-items:center; gap:12px; margin-bottom:20px; background:rgba(255,255,255,0.05); padding:10px; border-radius:15px;">
      <div style="width:40px; height:40px; background:var(--accent); border-radius:10px; display:flex; align-items:center; justify-content:center; font-weight:bold;">MÖ</div>
      <div>
        <div style="font-size:14px; font-weight:600;">Mesut Öztürk</div>
        <div style="font-size:11px; color:var(--sub);">mesutgoktug.eth</div>
      </div>
    </div>
    
    <a href="https://farcaster.xyz/mesutgoktug.eth" target="_blank" class="link-btn"><span>🟪 Farcaster</span><span>↗</span></a>
    <a href="https://x.com/soylebisey" target="_blank" class="link-btn"><span>𝕏 Twitter</span><span>↗</span></a>
    <a href="https://talent.app/mesutgoktug.eth" target="_blank" class="link-btn"><span>🏅 Talent</span><span>↗</span></a>
    <a href="https://paragraph.com/@mesutgoktug" target="_blank" class="link-btn"><span>✍️ Paragraph</span><span>↗</span></a>
    <a href="https://github.com/Mesut006" target="_blank" class="link-btn"><span>🐙 GitHub</span><span>↗</span></a>
  </div>
</div>

<script>
  const ADDR = "0xD6e402b477B05f8105be4fAaC4a43E0355aCc8F8";
  const ABI = [{"inputs":[],"name":"message","outputs":[{"type":"string"}],"stateMutability":"view","type":"function"},{"inputs":[{"name":"_msg","type":"string"}],"name":"setMessage","outputs":[],"stateMutability":"nonpayable","type":"function"}];

  let prov, sign, user;

  async function connect() {
    const st = document.getElementById("status");
    st.textContent = "Bağlanıyor...";
    try {
      let eth = (window.fSDK && window.fSDK.wallet) ? await window.fSDK.wallet.getEthereumProvider() : window.ethereum;
      
      if (!eth) {
        st.textContent = "Cüzdan bulunamadı.";
        return;
      }

      const accs = await eth.request({ method: "eth_requestAccounts" });
      user = accs[0];
      prov = new ethers.providers.Web3Provider(eth);
      sign = prov.getSigner();

      document.getElementById("addrBox").textContent = "Cüzdan: " + user.slice(0,6)+"...";
      document.getElementById("connectBtn").textContent = "Bağlandı";
      document.getElementById("sendBtn").disabled = false;
      st.textContent = "Başarılı!";
    } catch (e) {
      st.textContent = "Hata oluştu.";
    }
  }

  async function load() {
    try {
      const rpc = new ethers.providers.JsonRpcProvider("https://base-rpc.publicnode.com");
      const ctr = new ethers.Contract(ADDR, ABI, rpc);
      document.getElementById("currentMsg").textContent = await ctr.message();
    } catch (e) {}
  }

  async function send() {
    const val = document.getElementById("msgInput").value;
    const st = document.getElementById("status");
    if(!val || !sign) return;
    try {
      st.textContent = "Onay bekleniyor...";
      const ctr = new ethers.Contract(ADDR, ABI, sign);
      const tx = await ctr.setMessage(val);
      await tx.wait();
      st.textContent = "Güncellendi! ✅";
      addTx(tx.hash);
      load();
    } catch (e) { st.textContent = "Hata!"; }
  }

  function addTx(hash) {
    const h = document.getElementById("history");
    if(h.innerText.includes("yok")) h.innerHTML = "";
    const div = document.createElement("div");
    div.className = "tx-item";
    div.textContent = "TX: " + hash.slice(0,15) + "...";
    h.prepend(div);
  }

  document.getElementById("connectBtn").onclick = connect;
  document.getElementById("sendBtn").onclick = send;
  document.getElementById("refreshBtn").onclick = load;
  load();
</script>
</body>
</html>
